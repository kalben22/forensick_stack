services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"   # host:container — postgres listens on 5432 inside
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - forensicstack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - forensicstack
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO web console
    volumes:
      - minio_data:/data
    networks:
      - forensicstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - forensicstack

  # ── API (FastAPI) ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: forensicstack/backend:dev
    container_name: fs_backend
    command: uvicorn forensicstack.api.main:app --host 0.0.0.0 --port 8000 --reload --timeout-keep-alive 600
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "8001:8000"
    volumes:
      - .:/app:rw
      - tmp_jobs:/app/tmp_jobs   # for storing job results before uploading to MinIO
    networks:
      - forensicstack

  # ── Worker (Redis queue consumer) ─────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: forensicstack/worker:dev
    container_name: fs_worker
    command: python -m forensicstack.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      # WORKER_CONTAINER_NAME tells DockerExecutor which container to pass
      # to --volumes-from when spawning forensic tool containers (DooD mode).
      # This eliminates fragile host-path translation on Windows.
      WORKER_CONTAINER_NAME: fs_worker
      # HOST_BACKEND_DIR is only needed for native-mode fallback (worker not
      # running in Docker).  Leave empty when using docker-compose.
      HOST_BACKEND_DIR: "${HOST_BACKEND_DIR:-}"
    volumes:
      - .:/app:rw
      - tmp_jobs:/app/tmp_jobs
      - /var/run/docker.sock:/var/run/docker.sock   # worker spawns forensic tool containers
    networks:
      - forensicstack

volumes:
  postgres_data:
  redis_data:
  minio_data:
  chroma_data:
  tmp_jobs:

networks:
  forensicstack:
    driver: bridge